[modules]
left = ["Workspaces"]
center = []
right = [
  "Tray",
  "SystemInfo",
  [
    "Privacy",
    "Tempo",
    "Settings",
  ],
  "Notifications",
]

[notifications]
format = "%m/%d %H:%M"
show_timestamps = true
show_bodies = false
grouped = true
toast = true
toast_position = "top_right"
toast_timeout = 4000
toast_limit = 5
toast_max_height = 150
blocklist = ["blueman", "^org\\.gnome\\."]

[workspaces]
visibility_mode = "MonitorSpecific"
enable_workspace_filling = false

[tempo]
clock_format = "%a %d %b, %H:%M:%S"
weather_location = { City = "Lenzburg" }

[system_info]
indicators = ["Cpu", "Memory", "Temperature"]

[system_info.cpu]
warn_threshold = 60
alert_threshold = 80

[system_info.memory]
warn_threshold = 70
alert_threshold = 85

[system_info.disk]
warn_threshold = 80
alert_threshold = 90

[settings]
lock_cmd = "playerctl --all-players pause; nixGL hyprlock &"
audio_sinks_more_cmd = "pavucontrol -t 3"
audio_sources_more_cmd = "pavucontrol -t 4"
wifi_more_cmd = "nm-connection-editor"
vpn_more_cmd = "nm-connection-editor"
bluetooth_more_cmd = "blueberry"

[appearance]
style = "Islands"
scale_factor = 1.1

success_color = "#a6e3a1"
text_color = "#cdd6f4"

workspace_colors = ["#fab387", "#b4befe", "#cba6f7"]

[appearance.primary_color]
base = "#fab387"
text = "#1e1e2e"

[appearance.danger_color]
base = "#f38ba8"
weak = "#f9e2af"

[appearance.background_color]
base = "#1e1e2e"
weak = "#313244"
strong = "#45475a"

[appearance.secondary_color]
base = "#11111b"
strong = "#1b1b25"
